name: Services PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-services:
    name: Validate ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: platform-api
            path: services/platform-api
            run_pytest: true
            validate_alembic: true
            docker_tag: clustersage-platform-api
          - name: email-worker
            path: services/email-worker
            run_pytest: false
            validate_alembic: false
            docker_tag: clustersage-email-worker
          - name: collector-agent
            path: services/collector-agent
            run_pytest: true
            validate_alembic: false
            docker_tag: clustersage-collector-agent

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile application
        run: python -m compileall app

      - name: Run tests
        if: matrix.run_pytest
        run: pytest tests

      - name: Validate Alembic migrations
        if: matrix.validate_alembic
        run: alembic upgrade head --sql > /tmp/platform-api-alembic.sql

      - name: Build Docker image
        run: docker build -t ${{ matrix.docker_tag }}:${{ github.sha }} .

  security-scans:
    name: SonarQube and Snyk
    runs-on: ubuntu-latest
    needs: validate-services

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate security scan configuration
        if: github.event.pull_request.head.repo.fork == false
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ secrets.SONAR_TOKEN }}" ] || { echo "Missing SONAR_TOKEN secret."; exit 1; }
          [ -n "${{ secrets.SONAR_HOST_URL }}" ] || { echo "Missing SONAR_HOST_URL secret."; exit 1; }
          [ -n "${{ secrets.SNYK_TOKEN }}" ] || { echo "Missing SNYK_TOKEN secret."; exit 1; }

      - name: SonarQube scan
        if: github.event.pull_request.head.repo.fork == false
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.projectName=${{ github.event.repository.name }}
            -Dsonar.sources=services
            -Dsonar.tests=services/platform-api/tests,services/collector-agent/tests

      - name: Set up Python
        if: github.event.pull_request.head.repo.fork == false
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snyk CLI
        if: github.event.pull_request.head.repo.fork == false
        uses: snyk/actions/setup@master

      - name: Run Snyk dependency scan
        if: github.event.pull_request.head.repo.fork == false
        shell: bash
        run: snyk test --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Skip security scans on fork pull requests
        if: github.event.pull_request.head.repo.fork == true
        run: echo "Skipping SonarQube and Snyk because GitHub does not expose secrets to forked pull requests."
