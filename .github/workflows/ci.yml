name: Services CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - platform-api
          - email-worker
          - collector-agent
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m compileall app

  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: clustersage-backend
            context: services/platform-api
          - image: clustersage-email-worker
            context: services/email-worker
          - image: clustersage-agent
            context: services/collector-agent
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ${{ matrix.image }}:${{ github.sha }} ${{ matrix.context }}
