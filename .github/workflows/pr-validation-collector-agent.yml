name: Collector Agent PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "services/collector-agent/**"
      - ".github/workflows/pr-validation-collector-agent.yml"
      - ".github/workflows/publish-collector-agent.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Lint, Build, and Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/collector-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile application
        run: python -m compileall app

      - name: Run tests
        run: pytest tests

      - name: Build Docker image
        run: docker build -t clustersage-agent:${{ github.sha }} .

      - name: SonarQube scan
        if: github.event.pull_request.head.repo.fork == false
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            "-Dsonar.projectKey=ClusterSage_clustersage-services-collector-agent"
            "-Dsonar.projectName=clustersage-services-collector-agent"
            "-Dsonar.sources=services/collector-agent"

      - name: Set up Snyk CLI
        if: github.event.pull_request.head.repo.fork == false
        uses: snyk/actions/setup@master

      - name: Run Snyk scan
        if: github.event.pull_request.head.repo.fork == false
        run: snyk test --all-projects --detection-depth=2 --file=requirements.txt
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Skip security scans on fork pull requests
        if: github.event.pull_request.head.repo.fork == true
        run: echo "Skipping SonarQube and Snyk because GitHub does not expose secrets to forked pull requests."
