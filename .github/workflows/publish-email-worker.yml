name: Email Worker Build and Promote Dev

on:
  push:
    branches:
      - main
    paths:
      - "services/email-worker/**"
      - ".github/workflows/publish-email-worker.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_REPOSITORY: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.ACR_EMAIL_WORKER_REPOSITORY != '' && vars.ACR_EMAIL_WORKER_REPOSITORY || 'clustersage/email-worker' }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID }}
  GITOPS_REPOSITORY: ClusterSage/ClusterSage-gitops
  GITOPS_VALUES_FILE: environments/dev/values/clustersage-values.yaml

jobs:
  validate:
    name: Validate Email Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/email-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile application
        run: python -m compileall app

      - name: Build Docker image
        run: docker build -t clustersage-email-worker:${{ github.sha }} .

  docker:
    name: Build and Push Email Worker Image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Azure workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${AZURE_CLIENT_ID}" ] || { echo "Missing AZURE_CLIENT_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${AZURE_TENANT_ID}" ] || { echo "Missing AZURE_TENANT_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${AZURE_SUBSCRIPTION_ID}" ] || { echo "Missing AZURE_SUBSCRIPTION_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${{ vars.ACR_NAME }}" ] || { echo "Missing ACR_NAME variable."; exit 1; }
          [ -n "${{ vars.ACR_LOGIN_SERVER }}" ] || { echo "Missing ACR_LOGIN_SERVER variable."; exit 1; }

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set short SHA
        id: vars
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=ClusterSage Email Worker
            org.opencontainers.image.description=ClusterSage email worker container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push email worker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./services/email-worker
          file: ./services/email-worker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show published image
        run: |
          echo "${{ env.IMAGE_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}"
          echo "${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}"

      - name: Validate GitOps promotion configuration
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ secrets.GITOPS_REPO_TOKEN }}" ] || { echo "Missing GITOPS_REPO_TOKEN secret."; exit 1; }

      - name: Install yq
        shell: bash
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Promote email worker image tag in GitOps
        shell: bash
        run: |
          set -euo pipefail
          cd gitops
          export SHORT_SHA="${{ steps.vars.outputs.short_sha }}"
          export IMAGE_REPOSITORY="${{ env.IMAGE_REPOSITORY }}"
          export IMAGE_DIGEST="${{ steps.build.outputs.digest }}"
          [[ "${IMAGE_DIGEST}" == sha256:* ]] || { echo "Invalid image digest: ${IMAGE_DIGEST}"; exit 1; }
          yq -i '.emailWorker.image.repository = strenv(IMAGE_REPOSITORY)' "${GITOPS_VALUES_FILE}"
          yq -i '.emailWorker.image.tag = env(SHORT_SHA)' "${GITOPS_VALUES_FILE}"
          yq -i '.emailWorker.image.digest = strenv(IMAGE_DIGEST)' "${GITOPS_VALUES_FILE}"
          if git diff --quiet -- "${GITOPS_VALUES_FILE}"; then
            echo "No GitOps change required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${GITOPS_VALUES_FILE}"
          git commit -m "chore(dev): deploy email worker image ${SHORT_SHA}"
          git push origin HEAD:main
