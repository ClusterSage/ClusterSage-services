name: Email Worker Build and Deploy Dev

on:
  push:
    branches:
      - main
    paths:
      - "services/email-worker/**"
      - ".github/workflows/publish-email-worker.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_REPOSITORY: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.ACR_EMAIL_WORKER_REPOSITORY != '' && vars.ACR_EMAIL_WORKER_REPOSITORY || 'clustersage/email-worker' }}
  GITOPS_REPOSITORY: ClusterSage/ClusterSage-gitops
  DEV_VALUES_FILE: environments/dev/values/clustersage-values.yaml
  AZURE_CLIENT_ID_VALUE: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID_VALUE: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID_VALUE: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  build-and-deploy-dev:
    name: Build Once and Update Dev GitOps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/email-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile application
        run: python -m compileall app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        shell: bash
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}
          labels: |
            org.opencontainers.image.title=ClusterSage Email Worker
            org.opencontainers.image.description=ClusterSage email worker container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build email worker image for scan
        id: build_local
        uses: docker/build-push-action@v6
        with:
          context: ./services/email-worker
          file: ./services/email-worker/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan email worker image
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}:${{ steps.vars.outputs.image_tag }}
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Validate Azure OIDC inputs
        run: |
          if [[ -z "$AZURE_CLIENT_ID_VALUE" ]]; then
            echo "Missing AZURE_CLIENT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_TENANT_ID_VALUE" ]]; then
            echo "Missing AZURE_TENANT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_SUBSCRIPTION_ID_VALUE" ]]; then
            echo "Missing AZURE_SUBSCRIPTION_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
        shell: bash

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID_VALUE }}
          tenant-id: ${{ env.AZURE_TENANT_ID_VALUE }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID_VALUE }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Push email worker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./services/email-worker
          file: ./services/email-worker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate published digest
        run: |
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "Invalid or missing image digest: ${IMAGE_DIGEST}"
            exit 1
          fi
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash

      - name: Install yq
        shell: bash
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update dev email worker image values
        working-directory: gitops
        env:
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -f "$DEV_VALUES_FILE"
          yq -i '.emailWorker.image.repository = strenv(IMAGE_REPOSITORY)' "$DEV_VALUES_FILE"
          yq -i '.emailWorker.image.tag = strenv(IMAGE_TAG)' "$DEV_VALUES_FILE"
          yq -i '.emailWorker.image.digest = strenv(IMAGE_DIGEST)' "$DEV_VALUES_FILE"
        shell: bash

      - name: Commit and push dev GitOps update
        working-directory: gitops
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          if git diff --quiet -- "$DEV_VALUES_FILE"; then
            echo "No GitOps change required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DEV_VALUES_FILE"
          git commit -m "[skip ci] chore(dev): deploy email worker image ${IMAGE_TAG}"
          git pull --rebase origin main
          git push origin HEAD:main
        shell: bash
