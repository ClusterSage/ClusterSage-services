name: Collector Agent Build and Publish

on:
  push:
    branches:
      - main
    paths:
      - "services/collector-agent/**"
      - ".github/workflows/publish-collector-agent.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_REPOSITORY: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.ACR_COLLECTOR_AGENT_REPOSITORY != '' && vars.ACR_COLLECTOR_AGENT_REPOSITORY || 'clustersage-agent' }}
  AZURE_CLIENT_ID_VALUE: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID_VALUE: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID_VALUE: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  build-and-publish:
    name: Build and Publish Collector Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/collector-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile application
        run: python -m compileall app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        shell: bash
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=ClusterSage Collector Agent
            org.opencontainers.image.description=ClusterSage collector agent container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build collector agent image for scan
        id: build_local
        uses: docker/build-push-action@v6
        with:
          context: ./services/collector-agent
          file: ./services/collector-agent/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan collector agent image
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}:${{ steps.vars.outputs.image_tag }}
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Validate Azure OIDC inputs
        run: |
          if [[ -z "$AZURE_CLIENT_ID_VALUE" ]]; then
            echo "Missing AZURE_CLIENT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_TENANT_ID_VALUE" ]]; then
            echo "Missing AZURE_TENANT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_SUBSCRIPTION_ID_VALUE" ]]; then
            echo "Missing AZURE_SUBSCRIPTION_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
        shell: bash

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID_VALUE }}
          tenant-id: ${{ env.AZURE_TENANT_ID_VALUE }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID_VALUE }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Push collector agent image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./services/collector-agent
          file: ./services/collector-agent/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate published digest
        run: |
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "Invalid or missing image digest: ${IMAGE_DIGEST}"
            exit 1
          fi
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
