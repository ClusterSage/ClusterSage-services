name: Collector Agent Publish

on:
  push:
    branches:
      - main
    paths:
      - "services/collector-agent/**"
      - ".github/workflows/publish-collector-agent.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_REPOSITORY: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.ACR_COLLECTOR_AGENT_REPOSITORY != '' && vars.ACR_COLLECTOR_AGENT_REPOSITORY || 'clustersage-agent' }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  validate:
    name: Validate Collector Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/collector-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile application
        run: python -m compileall app

      - name: Build Docker image
        run: docker build -t clustersage-agent:${{ github.sha }} .

  docker:
    name: Build and Push Collector Agent Image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Azure workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${AZURE_CLIENT_ID}" ] || { echo "Missing AZURE_CLIENT_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${AZURE_TENANT_ID}" ] || { echo "Missing AZURE_TENANT_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${AZURE_SUBSCRIPTION_ID}" ] || { echo "Missing AZURE_SUBSCRIPTION_ID. Add it as an org/repo secret or variable."; exit 1; }
          [ -n "${{ vars.ACR_NAME }}" ] || { echo "Missing ACR_NAME variable."; exit 1; }
          [ -n "${{ vars.ACR_LOGIN_SERVER }}" ] || { echo "Missing ACR_LOGIN_SERVER variable."; exit 1; }

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set short SHA
        id: vars
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.short_sha }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=ClusterSage Collector Agent
            org.opencontainers.image.description=ClusterSage collector agent container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push collector agent image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./services/collector-agent
          file: ./services/collector-agent/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show published image
        run: |
          echo "${{ env.IMAGE_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}"
          echo "${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}"
          echo "${{ env.IMAGE_REPOSITORY }}:stable"
