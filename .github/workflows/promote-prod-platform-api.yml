name: Platform API Promote Prod

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Production release version, example: v1.0.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  ACR_SUBSCRIPTION_ID_VALUE: ${{ vars.ACR_SUBSCRIPTION_ID != '' && vars.ACR_SUBSCRIPTION_ID || secrets.ACR_SUBSCRIPTION_ID != '' && secrets.ACR_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
  GITOPS_REPOSITORY: ClusterSage/ClusterSage-gitops
  SOURCE_VALUES_FILE: environments/staging/values/clustersage-values.yaml
  TARGET_VALUES_FILE: environments/prod/values/clustersage-values.yaml
  AZURE_CLIENT_ID_VALUE: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID_VALUE: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID_VALUE: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  promote-prod:
    name: Promote Platform API From Staging to Prod
    runs-on: ubuntu-latest

    steps:
      - name: Validate release version
        run: |
          if [[ ! "${{ github.event.inputs.release_version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release_version. Expected format: vMAJOR.MINOR.PATCH"
            exit 1
          fi
        shell: bash

      - name: Validate Azure OIDC inputs
        run: |
          if [[ -z "$AZURE_CLIENT_ID_VALUE" ]]; then
            echo "Missing AZURE_CLIENT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_TENANT_ID_VALUE" ]]; then
            echo "Missing AZURE_TENANT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_SUBSCRIPTION_ID_VALUE" ]]; then
            echo "Missing AZURE_SUBSCRIPTION_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$ACR_NAME" || -z "$ACR_LOGIN_SERVER" ]]; then
            echo "Missing ACR_NAME or ACR_LOGIN_SERVER. Set them as GitHub variables."
            exit 1
          fi
          if [[ -z "$ACR_SUBSCRIPTION_ID_VALUE" ]]; then
            echo "Missing ACR_SUBSCRIPTION_ID or AZURE_SUBSCRIPTION_ID. Set one as a GitHub variable or secret."
            exit 1
          fi
        shell: bash

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID_VALUE }}
          tenant-id: ${{ env.AZURE_TENANT_ID_VALUE }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID_VALUE }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Read image metadata from staging
        id: source
        working-directory: gitops
        run: |
          if [[ "$SOURCE_VALUES_FILE" != "environments/staging/values/clustersage-values.yaml" ]]; then
            echo "Prod promotion must read from staging only."
            exit 1
          fi
          test -f "$SOURCE_VALUES_FILE"
          IMAGE_REPOSITORY="$(yq e '.backend.image.repository' "$SOURCE_VALUES_FILE")"
          IMAGE_TAG="$(yq e '.backend.image.tag' "$SOURCE_VALUES_FILE")"
          IMAGE_DIGEST="$(yq e '.backend.image.digest' "$SOURCE_VALUES_FILE")"

          if [[ -z "$IMAGE_REPOSITORY" || "$IMAGE_REPOSITORY" == "null" ]]; then
            echo "Staging backend image repository is missing."
            exit 1
          fi
          if [[ -z "$IMAGE_TAG" || "$IMAGE_TAG" == "null" ]]; then
            echo "Staging backend image tag is missing."
            exit 1
          fi
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "Staging backend image digest is invalid: $IMAGE_DIGEST"
            exit 1
          fi

          echo "image_repository=$IMAGE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "staging_image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_digest=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create production release tag in ACR
        env:
          IMAGE_REPOSITORY: ${{ steps.source.outputs.image_repository }}
          IMAGE_DIGEST: ${{ steps.source.outputs.image_digest }}
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          az account set --subscription "$ACR_SUBSCRIPTION_ID_VALUE"

          IMAGE_PATH="${IMAGE_REPOSITORY#${ACR_LOGIN_SERVER}/}"
          if [[ "$IMAGE_PATH" == "$IMAGE_REPOSITORY" || -z "$IMAGE_PATH" ]]; then
            echo "Image repository must belong to ${ACR_LOGIN_SERVER}: ${IMAGE_REPOSITORY}"
            exit 1
          fi

          az acr show --name "$ACR_NAME" --query id --output tsv >/dev/null

          az acr import \
            --name "$ACR_NAME" \
            --source "${IMAGE_REPOSITORY}@${IMAGE_DIGEST}" \
            --image "${IMAGE_PATH}:${RELEASE_VERSION}" \
            --force
        shell: bash

      - name: Update prod values
        working-directory: gitops
        env:
          IMAGE_REPOSITORY: ${{ steps.source.outputs.image_repository }}
          IMAGE_TAG: ${{ github.event.inputs.release_version }}
          IMAGE_DIGEST: ${{ steps.source.outputs.image_digest }}
        run: |
          test -f "$TARGET_VALUES_FILE"
          yq -i '.backend.image.repository = strenv(IMAGE_REPOSITORY)' "$TARGET_VALUES_FILE"
          yq -i '.backend.image.tag = strenv(IMAGE_TAG)' "$TARGET_VALUES_FILE"
          yq -i '.backend.image.digest = strenv(IMAGE_DIGEST)' "$TARGET_VALUES_FILE"
          yq -i '.migrationJob.image.repository = strenv(IMAGE_REPOSITORY)' "$TARGET_VALUES_FILE"
          yq -i '.migrationJob.image.tag = strenv(IMAGE_TAG)' "$TARGET_VALUES_FILE"
          yq -i '.migrationJob.image.digest = strenv(IMAGE_DIGEST)' "$TARGET_VALUES_FILE"
        shell: bash

      - name: Create prod promotion PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops
          commit-message: "[skip ci] chore(prod): release platform api ${{ github.event.inputs.release_version }}"
          branch: chore/prod-release-platform-api-${{ github.event.inputs.release_version }}
          delete-branch: true
          title: "chore(prod): release platform api ${{ github.event.inputs.release_version }}"
          body: |
            Promote the platform API image from staging to prod.

            Source of truth:
            - repository: `${{ steps.source.outputs.image_repository }}`
            - staging tag: `${{ steps.source.outputs.staging_image_tag }}`
            - prod release tag: `${{ github.event.inputs.release_version }}`
            - digest: `${{ steps.source.outputs.image_digest }}`

            This PR also keeps the migration job aligned to the same backend artifact without rebuilding the image.
          add-paths: |
            ${{ env.TARGET_VALUES_FILE }}
