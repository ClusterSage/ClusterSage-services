name: Publish service images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional release tag to publish in addition to sha tag
        required: false
        default: ""
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: acr-publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: clustersage-backend
            context: services/platform-api
          - image: clustersage-agent
            context: services/collector-agent
          - image: clusterwatch-agent
            context: services/collector-agent
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR login
        run: az acr login --name "${{ secrets.ACR_NAME }}"
      - name: Build and push
        shell: bash
        run: |
          set -euo pipefail
          LOGIN_SERVER="$(az acr show --name "${{ secrets.ACR_NAME }}" --query loginServer -o tsv)"
          SHA_TAG="sha-${GITHUB_SHA::12}"
          INPUT_TAG="${{ inputs.image_tag }}"
          docker build -t "$LOGIN_SERVER/${{ matrix.image }}:$SHA_TAG" "${{ matrix.context }}"
          docker push "$LOGIN_SERVER/${{ matrix.image }}:$SHA_TAG"
          if [ -n "$INPUT_TAG" ]; then
            docker tag "$LOGIN_SERVER/${{ matrix.image }}:$SHA_TAG" "$LOGIN_SERVER/${{ matrix.image }}:$INPUT_TAG"
            docker push "$LOGIN_SERVER/${{ matrix.image }}:$INPUT_TAG"
          fi
